[settings]
framerate = 60
frame_skip = 1
black_level = 0
white_level = 4095
contrast = 1.2
gamma = 2.2
enable_brightness_check = False
brightness_threshold = 5
file_index_width = 9
width = 1936
height = 1100
max_value = 4095

[timestamp]
font_path = /home/length/fonts/VCR_OSD_MONO_1.001.ttf
font_size = 25
text_color = 255
shadow_color = 0
shadow_width = 2
position = 30,30
timezone_offset_hours = 0

[video]
rotate_degrees = 0

[ffmpeg]
cmd = ffmpeg -y -f rawvideo -vcodec rawvideo -s {width}x{height} -pix_fmt gray -r {framerate} -i - -c:v libx265 -tag:v hvc1 -crf 23 -pix_fmt yuv420p -movflags faststart -loglevel quiet {temp_output_v}
